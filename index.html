<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EES KBC Master | Cinematic Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top right audio controls -->
    <div class="audio-controls">
        <button id="mute-btn" onclick="audioEngine.toggleMute()">🔊</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="audioEngine.setVolume(this.value)">
    </div>

    <div class="app-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active kbc-card cinematic-pulse">
            <div class="logo-area">
                <div class="kbc-logo glow">
                    <div class="logo-inner">EES<br>KBC</div>
                </div>
            </div>
            <h1 class="glow-text">EES KBC Master</h1>
            <p class="subtitle">Experience the ultimate cinematic MCQ challenge!</p>
            
            <div class="setup-grid">
                <div class="control-group">
                    <label for="q-count">Select Questions</label>
                    <select id="q-count" onchange="audioEngine.playHover()">
                        <option value="10">10 Questions (Quick Play)</option>
                        <option value="15">15 Questions (Full KBC Format)</option>
                        <option value="30">30 Questions</option>
                        <option value="50">50 Questions</option>
                        <option value="100">100 Questions</option>
                        <option value="all">Full Challenge (All MCQs)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="time-limit">Time Per MCQ</label>
                    <select id="time-limit" onchange="audioEngine.playHover()">
                        <option value="15">15 Seconds</option>
                        <option value="30" selected>30 Seconds</option>
                        <option value="60">60 Seconds</option>
                    </select>
                </div>
            </div>

            <button onclick="startGame()" class="btn-primary glow-btn" onmouseover="audioEngine.playHover()">Play Now</button>

            <div class="streak-box">
                <p id="streak-display">🔥 Practice Streak: <span class="streak-val">0 Days</span></p>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen kbc-card">
            
            <div class="top-bar">
                <div class="lifelines">
                    <button class="lifeline-btn" id="ll-5050" onclick="quizEngine.use5050()" onmouseover="audioEngine.playHover()">50:50</button>
                    <button class="lifeline-btn" id="ll-flip" onclick="quizEngine.useFlip()" onmouseover="audioEngine.playHover()">Flip Q</button>
                </div>
                <div class="level-indicator">
                    <div class="level-diamond glow">
                        <span id="current-q-num">1</span>
                    </div>
                </div>
            </div>

            <div class="timer-container">
                <div class="timer-circle glow">
                    <span id="timer-val">30</span>
                </div>
            </div>

            <div id="question-area">
                <div class="kbc-question-box glow">
                    <div class="hex-content" id="q-text">Question goes here?</div>
                </div>
                
                <div class="kbc-options-grid" id="options-grid">
                    <!-- Options injected here -->
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen kbc-card cinematic-pulse">
            <h1 class="glow-text">Performance Report</h1>
            <p class="subtitle" id="performance-text">Summary of your session.</p>

            <div class="result-stats">
                <div class="stat-card glow">
                    <span class="stat-val" id="res-score">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat-card glow">
                    <span class="stat-val" id="res-accuracy">0%</span>
                    <span class="stat-label">Accuracy</span>
                </div>
            </div>
            
            <div id="results-review" class="results-review"></div>

            <button onclick="location.reload()" class="btn-primary glow-btn" onmouseover="audioEngine.playHover()">Play Again</button>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="app.js"></script>
